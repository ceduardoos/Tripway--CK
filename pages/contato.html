<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>TripWay | Contato</title>
</head>
<body style="font-family: Poppins;">
    <nav>
        <a href="../index.html">Home</a>
        <ul style="display: flex; list-style-type: none;padding: 0; gap: 30px;">
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="pacotes.html">Pacotes ou Serviços</a></li>
            <li><a href="contato.html">Contato / Reserva</a></li>
            <section>
                <a href="../index.html">Voltar</a>
            </section>
        </ul>
    </nav>

    <main>
        <section>
                <img src="../images/logo.jpg" width="400" height="200" alt="Logo da empresa">
        </section>
        <section>
            <header>
                <h1>Formulario</h1>
            </header>
            <form>
                <!-- pedido do nome -->
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Seu nome completo">

                <!-- solicitação do email -->
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Seu email de cadastro">

                <!-- mostrará as opções dos destinos disponiveis -->
                <label for="destiny">Destino</label>
                <select id="destiny">
                    <option value="BH">Bahia</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PR">Sergipe</option>
                    
                </select>

                <!--solicitação da data de viagem -->
                <label for="date">Data</label>
                <input type="date" id="date" placeholder="data da viagem">

                <!--quantidade de pessoas para a viagem-->
                <label for="people">Quantidade de Pessoas</label>
                <input type="number" id="people">

                <!--uma entrada para uma mensagem do usuario-->
                <label for="messenger">Mensagem</label>
                <input type="text" id="messenger" placeholder="uma mensagem para a nossa equipe.">

                <!--botão de envio do formulario-->
                <button type="submit">Enviar</button>

            </form>
        </section>
    </main>
    
    
</body>
</html>
