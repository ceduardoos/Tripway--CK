<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripWay | Contato</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/contato.css">
</head>

<body>

    <header class="cabecalho-principal">
        <section class="infos-inicio">
            <ul class="telefone-email">
                <li>Telefone: 99999-9999</li>
                <li>Email: tripway@trip.com.br</li>
            </ul>
        </section>

        <div class="navegacao-container">
            <img class="img-cabecalho" src="../images/logo.png" alt="Logo da empresa">

            <nav>
                <ul class="paginas">
                    <li class="link-cabecalho"><a href="../index.html">Home</a></li>
                    <li class="link-cabecalho"><a href="destinos.html">Destinos</a></li>
                    <li class="link-cabecalho"><a href="pacotes.html">Pacotes ou serviços</a></li>
                    <li class="link-cabecalho"><a href="contato.html">Contato / Reserva</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="texto-principal">
            <h1>Formulario</h1>
            <h2>faça sua reserva aqui</h2>
            <p class="paragrafo-index">preencha o formulario abaixo para reservar sua viagem</p>
        </section>

        <section>
            <form>
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Seu nome completo" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Seu email de cadastro" required>

                <label for="destiny">Destino</label>
                <select id="destiny" required>
                    <option value="BH">Bahia</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PR">Sergipe</option>
                </select>

                <label for="date">Data</label>
                <input type="date" id="date" placeholder="data da viagem" required>

                <label for="people">Quantidade de Pessoas</label>
                <input type="number" id="people" required>

                <label for="messenger">Mensagem</label>
                <input type="text" id="messenger" placeholder="uma mensagem para a nossa equipe." required>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Insira seus dados e entraremos em contato:</p>
        
        <form action="#" method="POST">
            <label for="telefone">Telefone:</label>
            <input type="tel" name="telefone" id="telefone" placeholder="Digite seu telefone" required>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
            <br>
            <button type="submit">Enviar</button>
        </form>
    </footer>


</body>
</html>
