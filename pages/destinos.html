<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripway | Destinos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <header class="cabecalho-principal">
        <section class="infos-inicio">
            <ul class="telefone-email">
                <li>Telefone: 99999-9999</li>
                <li>Email: tripway@trip.com.br</li>
            </ul>
        </section>

        <div class="navegacao-container">
            <img class="img-cabecalho" src="../images/logo.png" alt="Logo da empresa TripWay">
            
            <nav>
                <ul class="paginas">
                    <li class="link-cabecalho"><a href="../index.html">Home</a></li>
                    <li class="link-cabecalho"><a href="destinos.html">Destinos</a></li>
                    <li class="link-cabecalho"><a href="pacotes.html">Pacotes ou serviços</a></li>
                    <li class="link-cabecalho"><a href="contato.html">Contato / Reserva</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <section class="apresentacao-destinos">
            <header class="texto-principal">
                <h1>Destinos</h1>
                <h2>Confira os melhores destinos no nosso site</h2>
            </header>
        </section>

    </main>

    <footer>
        <h3>Contatos:</h3>
        <p>Insira seus dados e entraremos em contato:</p>

        <form action="#" method="POST">
            <label for="telefone">Telefone:</label>
            <input type="tel" name="telefone" id="telefone" placeholder="Digite seu telefone" required>
            <br>
            <label for="email">E-mail:</label>
            <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
            <br>
            <button type="submit">Enviar</button>
        </form>

    </footer>


</body>

</html>
